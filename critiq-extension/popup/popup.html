<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 240px; padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117; color: #e2e8f0;
    }
    .header { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
    .dot { width: 8px; height: 8px; background: #FF9900; border-radius: 50%; }
    .title { font-size: 16px; font-weight: 700; }
    .desc { font-size: 12px; color: #8892a4; line-height: 1.5; margin-bottom: 16px; }
    .btn {
      width: 100%; padding: 10px; border-radius: 10px; font-size: 13px;
      font-weight: 600; cursor: pointer; border: none; text-align: center;
    }
    .btn-primary { background: #FF9900; color: #000; }
    .btn-primary:hover { background: #ffad33; }
    .btn-danger {
      background: transparent; border: 1px solid rgba(255,255,255,0.08);
      color: #8892a4; margin-top: 8px;
    }
    .btn-danger:hover { color: #ef4444; border-color: #ef4444; }
  </style>
</head>
<body>
  <div class="header">
    <span class="dot"></span>
    <span class="title">Critiq</span>
  </div>
  <p class="desc">Toggle the feedback overlay on any page to drop pins and leave comments.</p>
  <button class="btn btn-primary" id="toggle">Activate on this page</button>
  <button class="btn btn-danger" id="clear">Clear all comments</button>
  <script src="popup.js"></script>
</body>
</html>
